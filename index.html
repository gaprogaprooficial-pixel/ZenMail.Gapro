<script src="https://cdn.tailwindcss.com"></script>
<style>
  .chat-wallpaper { 
    background-color: #0b141a;
    background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
    background-blend-mode: overlay;
    background-opacity: 0.06; 
  }
  .bubble-in { background-color: #202c33; border-radius: 0 15px 15px 15px; align-self: flex-start; }
  .bubble-out { background-color: #005c4b; border-radius: 15px 0 15px 15px; align-self: flex-end; }
  .v-blue { background: #3b82f6; }
  .v-gold { background: #facc15; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
</style>

<body class="bg-[#111b21] font-sans text-slate-200 overflow-hidden">
  <div id="app">

    <div id="login-screen" class="h-screen flex flex-col items-center justify-center bg-[#111b21]">
      <div class="text-center mb-10">
          <div class="w-32 h-32 bg-transparent rounded-full flex items-center justify-center mx-auto mb-4">
              <img src="tu-logo.png" id="main-logo" class="w-full h-full object-contain" alt="Logo">
          </div>
          <h1 class="text-4xl font-black text-white tracking-widest uppercase italic">ZenApp</h1>
      </div>
      <div class="bg-[#222e35] p-8 rounded-2xl w-[380px] shadow-2xl border-t-4 border-[#00a884]">
        <input type="text" id="login-user" placeholder="Tu nombre" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-4 text-white border border-transparent focus:border-[#00a884]">
        <input type="password" id="login-pass" placeholder="Contraseña" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-6 text-white border border-transparent focus:border-[#00a884]">
        <button onclick="auth()" class="w-full bg-[#00a884] py-4 rounded-xl font-black text-[#111b21] hover:bg-[#06cf9c] uppercase tracking-widest">Entrar / Unirse</button>
      </div>
    </div>

    <div id="chat-interface" class="hidden h-screen flex bg-[#111b21]">
      <aside class="w-[400px] border-r border-white/5 flex flex-col bg-[#111b21]">
        <header class="p-4 bg-[#202c33] flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="my-avatar" onclick="openAdminPanel()" class="w-10 h-10 rounded-full cursor-pointer object-cover border border-white/10">
                <div>
                    <p id="my-name-display" class="text-xs font-bold text-white"></p>
                    <p id="my-id-display" onclick="copyMyID()" class="text-[10px] text-[#00a884] font-black cursor-pointer hover:underline"></p>
                </div>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-white">❌</button>
        </header>

        <div class="p-4">
            <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Buscar por ID</label>
            <div class="flex gap-2">
                <input type="text" id="id-search-input" placeholder="Ej: ZEN-1234" class="flex-1 p-2.5 bg-[#202c33] rounded-lg text-xs outline-none text-white border border-transparent focus:border-[#00a884]">
                <button onclick="searchByID()" class="bg-[#00a884] px-4 rounded-lg text-xs font-bold text-[#111b21]">BUSCAR</button>
            </div>
            <div id="id-result-container" class="mt-4"></div>
        </div>

        <div id="chats-list" class="flex-1 overflow-y-auto border-t border-white/5"></div>
      </aside>

      <main class="flex-1 flex flex-col chat-wallpaper">
        <header id="chat-header" class="hidden p-4 bg-[#202c33] flex items-center gap-4 border-l border-white/5 shadow-lg">
            <div id="target-avatar" class="w-10 h-10 rounded-full"></div>
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span id="target-name" class="font-bold text-white text-sm"></span>
                    <div id="target-verify" class="hidden p-0.5 rounded-full"><svg class="w-2.5 h-2.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg></div>
                </div>
                <span id="target-id-label" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest"></span>
            </div>
        </header>
        <div id="messages-flow" class="flex-1 p-8 overflow-y-auto flex flex-col gap-4"></div>
        <div id="chat-input-bar" class="hidden p-4 bg-[#202c33] flex items-center gap-4 border-l border-white/5">
            <input type="text" id="msg-input" placeholder="Mensaje..." class="flex-1 p-3 bg-[#2a3942] rounded-xl outline-none text-white text-sm">
            <button onclick="send()" class="text-[#00a884] font-black px-4 hover:scale-105 transition-transform">ENVIAR</button>
        </div>
      </main>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[1000] flex items-center justify-center p-6">
      <div class="bg-[#111b21] border border-[#00a884]/30 rounded-3xl w-full max-w-4xl h-[80vh] flex flex-col overflow-hidden">
        <header class="p-5 bg-[#202c33] flex justify-between items-center">
          <h2 class="font-black text-[#00a884] uppercase tracking-widest italic text-lg">Control Maestro</h2>
          <button onclick="closeAdmin()" class="bg-red-600 px-6 py-2 rounded-lg text-xs text-white font-bold uppercase tracking-widest">Cerrar</button>
        </header>
        <div id="admin-list-container" class="flex-1 p-6 overflow-y-auto space-y-4"></div>
      </div>
    </div>

  </div>

  <script>
    const ADMIN_PASS = "ZM_X99_ROOT_#SECURITY_2026";
    let users = JSON.parse(localStorage.getItem('za_id_users')) || [
        { id: "ZEN-0001", name: "Admin", pass: "123", isVerified: true, vColor: "v-gold", banned: false, photo: "https://ui-avatars.com/api/?name=A&background=00a884&color=fff" }
    ];
    let messages = JSON.parse(localStorage.getItem('za_id_messages')) || [];
    let me = null;
    let talkingTo = null;

    function saveDB() {
      localStorage.setItem('za_id_users', JSON.stringify(users));
      localStorage.setItem('za_id_messages', JSON.stringify(messages));
    }

    function auth() {
      const uName = document.getElementById('login-user').value.trim();
      const uPass = document.getElementById('login-pass').value.trim();
      if(!uName || !uPass) return;
      let user = users.find(x => x.name.toLowerCase() === uName.toLowerCase() && x.pass === uPass);
      if(user) {
        if(user.banned) return alert("TU CUENTA HA SIDO BANEADA");
        me = user;
      } else {
        const newID = "ZEN-" + Math.floor(1000 + Math.random() * 9000);
        me = { id: newID, name: uName, pass: uPass, isVerified: false, vColor: "v-blue", banned: false, photo: `https://ui-avatars.com/api/?name=${uName}&background=random` };
        users.push(me);
        saveDB();
        alert("¡Hola! Tu ID único es: " + newID);
      }
      startApp();
    }

    function startApp() {
      document.getElementById('my-avatar').src = me.photo;
      document.getElementById('my-name-display').innerText = me.name;
      document.getElementById('my-id-display').innerText = me.id;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('chat-interface').classList.remove('hidden');
      renderHistory();
    }

    function searchByID() {
        const query = document.getElementById('id-search-input').value.trim().toUpperCase();
        const found = users.find(u => u.id === query);
        if(found && found.id !== me.id) {
            document.getElementById('id-result-container').innerHTML = `
                <div onclick="openChat('${found.id}')" class="p-3 bg-[#2a3942] rounded-xl flex items-center justify-between cursor-pointer border border-[#00a884]">
                    <span class="text-xs font-bold text-white">${found.name} (${found.id})</span>
                    <span class="text-[10px] bg-[#00a884] text-[#111b21] px-2 py-1 rounded font-black">CHAT</span>
                </div>`;
        }
    }

    function openChat(id) {
      talkingTo = id;
      const target = users.find(x => x.id === id);
      document.getElementById('chat-header').classList.remove('hidden');
      document.getElementById('chat-input-bar').classList.remove('hidden');
      document.getElementById('target-name').innerText = target.name;
      document.getElementById('target-id-label').innerText = target.id;
      document.getElementById('target-avatar').innerHTML = `<img src="${target.photo}" class="w-full h-full rounded-full">`;
      const v = document.getElementById('target-verify');
      v.classList.toggle('hidden', !target.isVerified);
      v.className = `p-0.5 rounded-full ${target.vColor}`;
      renderMessages();
    }

    function renderHistory() {
      const list = document.getElementById('chats-list');
      const contacts = [...new Set(messages.filter(m => m.to === me.id || m.from === me.id).map(m => m.from === me.id ? m.to : m.from))];
      list.innerHTML = contacts.map(cid => {
        const u = users.find(x => x.id === cid);
        return `<div onclick="openChat('${u.id}')" class="p-4 flex items-center gap-4 hover:bg-[#202c33] cursor-pointer border-b border-white/5 transition-colors"><img src="${u.photo}" class="w-10 h-10 rounded-full"><div><p class="text-white text-sm font-bold">${u.name}</p><p class="text-[10px] text-slate-500 font-bold">${u.id}</p></div></div>`;
      }).join('');
    }

    function send() {
      const input = document.getElementById('msg-input');
      if(!input.value.trim() || !talkingTo) return;
      messages.push({ from: me.id, to: talkingTo, text: input.value.trim() });
      input.value = "";
      saveDB();
      renderMessages();
      renderHistory();
    }

    function renderMessages() {
      const flow = document.getElementById('messages-flow');
      const conv = messages.filter(m => (m.from === me.id && m.to === talkingTo) || (m.from === talkingTo && m.to === me.id));
      flow.innerHTML = conv.map(m => `<div class="flex flex-col ${m.from === me.id ? 'items-end' : 'items-start'}"><div class="p-3 max-w-[75%] ${m.from === me.id ? 'bubble-out' : 'bubble-in'}"><p class="text-sm text-white">${m.text}</p></div></div>`).join('');
      flow.scrollTop = flow.scrollHeight;
    }

    function openAdminPanel() {
      if(prompt("PASSWORD MAESTRA:") === ADMIN_PASS) { renderAdminList(); document.getElementById('admin-modal').classList.remove('hidden'); }
    }

    function renderAdminList() {
      document.getElementById('admin-list-container').innerHTML = users.map(u => `
        <div class="p-5 bg-[#202c33] rounded-2xl flex items-center justify-between border border-white/5 shadow-lg">
            <div class="flex items-center gap-4">
                <img src="${u.photo}" class="w-12 h-12 rounded-full border border-white/10">
                <div>
                    <p class="text-white text-sm font-black">${u.name} ${u.banned ? '🚫' : ''}</p>
                    <p class="text-[#00a884] text-[10px] font-bold tracking-widest uppercase italic">ID: ${u.id}</p>
                    <p class="text-yellow-500 text-[11px] font-mono mt-1">Clave: ${u.pass}</p>
                    <select onchange="updateColor('${u.id}', this.value)" class="bg-black text-[9px] text-white p-1 mt-2 rounded border border-white/20">
                        <option value="v-blue" ${u.vColor==='v-blue'?'selected':''}>Azul</option>
                        <option value="v-gold" ${u.vColor==='v-gold'?'selected':''}>Oro</option>
                    </select>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleVerify('${u.id}')" class="bg-blue-600 px-4 py-2 rounded-lg text-[10px] text-white font-bold uppercase">${u.isVerified ? 'Quitar Verif' : 'Verificar'}</button>
                <button onclick="toggleBan('${u.id}')" class="bg-orange-600 px-4 py-2 rounded-lg text-[10px] text-white font-bold uppercase">${u.banned ? 'Desbanear' : 'Banear'}</button>
                <button onclick="deleteUser('${u.id}')" class="bg-red-700 px-4 py-2 rounded-lg text-[10px] text-white font-black uppercase italic">Borrar</button>
            </div>
        </div>`).join('');
    }

    function toggleVerify(id) { let u = users.find(x => x.id === id); u.isVerified = !u.isVerified; saveDB(); renderAdminList(); }
    function toggleBan(id) { let u = users.find(x => x.id === id); if(u.id === me.id) return; u.banned = !u.banned; saveDB(); renderAdminList(); }
    function deleteUser(id) { if(id === "ZEN-0001") return; if(confirm("¿Eliminar para siempre?")) { users = users.filter(x => x.id !== id); saveDB(); renderAdminList(); }}
    function updateColor(id, color) { let u = users.find(x => x.id === id); u.vColor = color; saveDB(); renderAdminList(); }
    function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
    function logout() { me = null; location.reload(); }
    function copyMyID() { navigator.clipboard.writeText(me.id); alert("¡Copiado!"); }
  </script>
</body>
