<script src="https://cdn.tailwindcss.com"></script>
<style>
  .badge-vip {
    background: linear-gradient(135deg, #00c6ff, #0072ff, #00c6ff);
    background-size: 200% 200%;
    animation: shine-vip 3s linear infinite;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 9999px; padding: 2px; flex-shrink: 0;
  }
  .v-blue { background: #3b82f6; }
  .v-gold { background: #facc15; }
  .v-green { background: #10b981; }
  .v-purple { background: #a855f7; }
  @keyframes shine-vip { 0% {background-position: 0% 50%} 100% {background-position: 200% 50%} }
  .zen-logo { background: linear-gradient(135deg, #6366f1, #4f46e5, #4338ca); }
  .admin-panel-neon { background: rgba(2, 6, 23, 0.98); border: 1px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
  .maintenance-active { position: fixed; inset: 0; z-index: 9999; background: #020617; display: flex; align-items: center; justify-content: center; text-align: center; }
</style>

<body class="bg-slate-950 font-sans text-slate-100 overflow-hidden">
  <div id="app">
    <div id="maint-view" class="hidden maintenance-active flex-col">
        <h1 class="text-6xl font-black italic text-indigo-500">ZenMail</h1>
        <h2 class="text-2xl font-bold mt-4 uppercase">Fuera de Servicio</h2>
        <p class="text-slate-500 mt-2">Estamos mejorando el sistema...</p>
    </div>

    <div id="register-screen" class="h-screen flex flex-col items-center justify-center bg-black/50 p-6">
      <div class="bg-white/5 backdrop-blur-3xl p-10 rounded-[3.5rem] w-[450px] border border-white/10 text-center flex flex-col gap-6">
        <div class="flex items-center justify-center gap-3">
            <div class="w-12 h-12 rounded-3xl zen-logo flex items-center justify-center rotate-[-10deg] shadow-lg"><span class="text-3xl font-black text-white italic">Z</span></div>
            <h1 class="text-4xl font-black text-white italic tracking-tighter">ZenMail</h1>
        </div>
        <input type="text" id="reg-user" placeholder="Usuario" class="w-full p-4 bg-white/5 rounded-2xl outline-none border border-white/10 text-center font-bold text-white">
        <input type="password" id="reg-pass" placeholder="Contraseña" class="w-full p-4 bg-white/5 rounded-2xl border border-white/10 outline-none text-center font-bold text-white">
        <button onclick="handleAuth()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold hover:bg-indigo-50 text-lg uppercase">Entrar</button>
      </div>
    </div>

    <div id="main-screen" class="hidden h-screen flex bg-white text-slate-900">
      <aside class="w-72 border-r p-6 flex flex-col justify-between bg-slate-50">
        <div class="flex flex-col gap-4">
          <div class="flex items-center gap-3 cursor-pointer mb-4" onclick="checkAdmin()">
            <div class="w-10 h-10 rounded-2xl zen-logo flex items-center justify-center text-white font-black italic shadow-lg">Z</div>
            <h2 class="text-xl font-black tracking-tighter">ZenMail</h2>
          </div>
          <button onclick="loadMessages()" class="w-full p-4 bg-indigo-600 text-white rounded-[2rem] font-bold text-left flex gap-3 italic">📥 Bandeja</button>
          <button onclick="openNote()" class="w-full p-4 bg-white border text-slate-600 rounded-[2rem] font-bold text-left flex gap-3 hover:bg-indigo-50 italic">📝 Notas</button>
          <button onclick="alert('Papelera vacía')" class="w-full p-4 bg-white border text-slate-400 rounded-[2rem] font-bold text-left flex gap-3 hover:bg-red-50 italic">🗑️ Papelera</button>
        </div>
        <div class="p-5 bg-white rounded-[3rem] border shadow-inner text-center">
            <img id="user-img-final" class="w-16 h-16 mx-auto mb-3 rounded-full border-2 object-cover">
            <div class="flex items-center justify-center gap-1">
                <span id="user-display" class="font-bold text-[11px] truncate text-slate-700"></span>
                <div id="check-badge" class="hidden flex items-center justify-center rounded-full p-0.5"><svg class="w-2.5 h-2.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg></div>
            </div>
            <button onclick="logoutNow()" class="mt-2 text-[9px] uppercase font-bold text-red-500">Cerrar Sesión</button>
        </div>
      </aside>

      <main class="flex-1 flex flex-col">
        <header class="p-6 border-b bg-white"><div class="relative w-1/2"><input type="text" id="search-input" onkeyup="searchEngine()" placeholder="Buscar ZenMail..." class="w-full p-3 bg-slate-100 rounded-2xl outline-none text-sm font-bold"></div></header>
        <div id="email-list" class="flex-1 p-8 overflow-y-auto space-y-4 bg-slate-50/50"></div>
      </main>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[500] flex items-center justify-center p-4">
      <div class="admin-panel-neon rounded-[3rem] w-full max-w-6xl h-[90vh] flex flex-col overflow-hidden">
        <div class="p-6 bg-slate-900 flex justify-between items-center border-b border-blue-900 text-white">
          <h2 class="text-xl font-black text-blue-400 italic">ZEN ADMIN</h2>
          <div class="flex items-center gap-3">
            <button id="maint-btn" onclick="toggleMaint()" class="bg-orange-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Mantenimiento: OFF</button>
            <button onclick="sendGlobal()" class="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white">📢 Global</button>
            <button onclick="closeAdmin()" class="bg-red-600 px-6 py-2 rounded-xl text-[10px] font-bold uppercase">Salir</button>
          </div>
        </div>
        <div id="admin-db-list" class="flex-1 p-6 overflow-y-auto space-y-3 bg-slate-950/50"></div>
      </div>
    </div>
  </div>

  <script>
    const MASTER_SECURITY_KEY = "ZM_X99_ROOT_#SECURITY_2026";
    let isMaint = JSON.parse(localStorage.getItem('zen_maint')) || false;
    let usersDB = JSON.parse(localStorage.getItem('zen_users')) || [
      { email: "admin@zenmail.com", pass: "123", isVerified: true, vColor: "v-gold", isBanned: false, photo: "https://ui-avatars.com/api/?name=Admin" }
    ];
    let messagesDB = JSON.parse(localStorage.getItem('zen_messages')) || [];
    let currentUser = null;

    function save() {
      localStorage.setItem('zen_users', JSON.stringify(usersDB));
      localStorage.setItem('zen_messages', JSON.stringify(messagesDB));
      localStorage.setItem('zen_maint', JSON.stringify(isMaint));
    }

    function checkMaint() {
        const view = document.getElementById('maint-view');
        if (isMaint && (!currentUser || currentUser.email !== "admin@zenmail.com")) {
            view.classList.remove('hidden');
        } else { view.classList.add('hidden'); }
    }

    function toggleMaint() {
        isMaint = !isMaint;
        save();
        updateAdminList();
        checkMaint();
    }

    function handleAuth() {
      const user = document.getElementById('reg-user').value.trim();
      const pass = document.getElementById('reg-pass').value.trim();
      const email = user.includes('@') ? user : user + "@zenmail.com";
      let found = usersDB.find(u => u.email.toLowerCase() === email.toLowerCase());
      if(found) {
        if(found.isBanned) return alert("CUENTA BANEADA");
        if(found.pass !== pass) return alert("Contraseña incorrecta");
        currentUser = found;
      } else {
        currentUser = { email, pass, isVerified: false, vColor: "v-blue", isBanned: false, photo: `https://ui-avatars.com/api/?name=${user}` };
        usersDB.push(currentUser);
        save();
      }
      checkMaint();
      if (!isMaint || currentUser.email === "admin@zenmail.com") enterApp();
    }

    function enterApp() {
      document.getElementById('user-display').innerText = currentUser.email;
      document.getElementById('user-img-final').src = currentUser.photo;
      const cb = document.getElementById('check-badge');
      cb.classList.toggle('hidden', !currentUser.isVerified);
      cb.className = `hidden flex items-center justify-center rounded-full p-0.5 ${currentUser.vColor}`;
      document.getElementById('register-screen').classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');
      loadMessages();
    }

    function updateAdminList() {
      document.getElementById('maint-btn').innerText = `Mantenimiento: ${isMaint ? 'ON' : 'OFF'}`;
      document.getElementById('admin-db-list').innerHTML = usersDB.map(u => `
        <div class="p-4 bg-slate-900 border border-blue-900/30 rounded-2xl flex items-center justify-between">
          <div class="flex items-center gap-4 text-white">
            <img src="${u.photo}" class="w-10 h-10 rounded-full border border-blue-500">
            <div>
                <p class="font-bold text-xs">${u.email} ${u.isBanned ? '<span class="text-red-500">[BAN]</span>' : ''}</p>
                <select onchange="changeColor('${u.email}', this.value)" class="bg-black text-[8px] border border-blue-900 rounded text-white mt-1">
                    <option value="v-blue" ${u.vColor==='v-blue'?'selected':''}>Azul</option>
                    <option value="v-gold" ${u.vColor==='v-gold'?'selected':''}>Dorado</option>
                    <option value="v-green" ${u.vColor==='v-green'?'selected':''}>Verde</option>
                </select>
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="spy('${u.email}')" class="bg-indigo-600 px-3 py-1 rounded-lg text-[8px] font-black text-white">MENSAJES 👁️</button>
            <button onclick="toggleV('${u.email}')" class="bg-blue-600 px-3 py-1 rounded-lg text-[8px] font-black text-white">VERIFICAR</button>
            <button onclick="ban('${u.email}')" class="bg-orange-600 px-3 py-1 rounded-lg text-[8px] font-black text-white">${u.isBanned ? 'DESBAN' : 'BAN'}</button>
            <button onclick="del('${u.email}')" class="bg-red-600 px-3 py-1 rounded-lg text-[8px] font-black text-white">ELIMINAR</button>
          </div>
        </div>`).join('');
    }

    function ban(email) {
        let u = usersDB.find(u => u.email === email);
        u.isBanned = !u.isBanned;
        save(); updateAdminList();
    }

    function del(email) {
        if(confirm("¿Eliminar cuenta permanentemente?")) {
            usersDB = usersDB.filter(u => u.email !== email);
            save(); updateAdminList();
        }
    }

    function toggleV(email) {
        let u = usersDB.find(u => u.email === email);
        u.isVerified = !u.isVerified;
        save(); updateAdminList();
    }

    function changeColor(email, color) {
        let u = usersDB.find(u => u.email === email);
        u.vColor = color;
        save(); updateAdminList();
    }

    function spy(email) {
        const msgs = messagesDB.filter(m => m.from === email);
        alert(msgs.map(m => `A: ${m.to} | MSG: ${m.text}`).join('\n\n') || "No hay mensajes.");
    }

    function sendGlobal() {
        const t = prompt("Mensaje Global:");
        if(t) { usersDB.forEach(u => messagesDB.push({ from: "SISTEMA", to: u.email, text: t })); save(); loadMessages(); }
    }

    function checkAdmin() {
      if(prompt("CLAVE ADMIN:") === MASTER_SECURITY_KEY) {
        updateAdminList();
        document.getElementById('admin-panel').classList.remove('hidden');
      }
    }

    function loadMessages() {
      const list = document.getElementById('email-list');
      const my = messagesDB.filter(m => m.to.toLowerCase() === currentUser.email.toLowerCase());
      list.innerHTML = my.reverse().map(m => `<div class="p-6 bg-white rounded-3xl border shadow-sm flex flex-col gap-2"><b>De: ${m.from}</b><p>${m.text}</p></div>`).join('');
    }

    function searchEngine() {
      const q = document.getElementById('search-input').value.toLowerCase();
      if(q.length < 1) return;
      let u = usersDB.find(u => u.email.toLowerCase().includes(q));
      if(u) {
          const m = prompt("Mensaje para " + u.email);
          if(m) { messagesDB.push({from: currentUser.email, to: u.email, text: m}); save(); }
      }
    }

    function logoutNow() { currentUser = null; location.reload(); }
    function closeAdmin() { document.getElementById('admin-panel').classList.add('hidden'); }
    function openNote() { const n = prompt("Nota:"); if(n) { messagesDB.push({from: "NOTA", to: currentUser.email, text: n}); save(); loadMessages(); }}
    
    checkMaint();
  </script>
</body>
